<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    background:#f8ede3;
    font-family:Arial,sans-serif;
}

.container{
    width:80%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    color:#5D4037;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#6D4C41;
    color:white;
    padding:15px;
}

table td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

img{
    width:80px;
    height:80px;
    object-fit:cover;
}

button{
    padding:8px 15px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

.total{
    text-align:right;
    margin-top:25px;
    font-size:25px;
    font-weight:bold;
}

.checkout{

    display:block;
    width:200px;
    margin:30px auto;
    padding:15px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;

}

.checkout:hover{

    background:#2E7D32;

}

</style>

</head>

<body>

<div class="container">

<h1>🛒 Shopping Cart</h1>

<table>

<tr>

<th>Image</th>

<th>Product</th>

<th>Price</th>

<th>Quantity</th>

<th>Remove</th>

</tr>

<tr>

<td>
<img src="{{ url_for('static', filename='images/dairymilk.jpg') }}">
</td>

<td>Dairy Milk</td>

<td>₹100</td>

<td>
    <span class="quantity">1</span>
</td>

<td>
<button onclick="addCartItem(this,100)">
Add
</button>
<button onclick="removeCartRow(this)">
Remove
</button>

</td>

</tr>

<tr>

<td>

<img src="{{ url_for('static', filename='images/kitkat.jpg') }}">

</td>

<td>KitKat</td>

<td>₹80</td>

<td>
    <span class="quantity">1</span>
</td>

<td>
<button onclick="addCartItem(this,100)">
Add
</button>
<button onclick="removeCartRow(this)">
Remove
</button>

</td>

</tr>
<tr>

<td>

<img src="{{ url_for('static', filename='images/snickers.jpg') }}">

</td>

<td>snickers</td>

<td>₹60</td>

<td>
    <span class="quantity">1</span>
</td>

<td>
<button onclick="addCartItem(this,100)">
Add
</button>
<button onclick="removeCartRow(this)">
Remove
</button>

</td>

</tr>

<tr>

<td>

<img src="{{ url_for('static', filename='images/ferrero.jpg') }}">

</td>

<td>Ferrero Rocher</td>

<td>₹350</td>

<td>
    <span class="quantity">1</span>
</td>

<td>
<button onclick="addCartItem(this,100)">
Add
</button>
<button onclick="removeCartRow(this)">
Remove
</button>

</td>

</tr>

</table>

<div class="total">

Total : ₹670

</div>

<button class="checkout" onclick="checkout()">
Proceed to Checkout
</button>

<p id="success"></p>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
