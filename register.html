<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Choco World</title>

<a href="{{ url_for('register') }}">Register</a>

<style>

body{
    background:#f8ede3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,.3);
}

.register-container h2{
    text-align:center;
    color:#5D4037;
    margin-bottom:20px;
}

.register-container input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

.register-container button{
    width:100%;
    padding:12px;
    background:#6D4C41;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:18px;
}

.register-container button:hover{
    background:#3E2723;
}

.register-container p{
    text-align:center;
    margin-top:15px;
}

.register-container a{
    text-decoration:none;
    color:#E65100;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="register-container">

<h2>🍫 Register</h2>

<form method="POST" action="{{ url_for('register') }}" onsubmit="return validateRegister()">

<input type="text" 
name="fullname"
id="fullname" 
placeholder="Full Name">

<input type="email"
name="email"
id="email"
placeholder="Email Address">

<input type="text"
name="phone"
id="phone"
placeholder="Phone Number">

<input type="password"
name="password"
id="password"
placeholder="Password">

<input type="password"
id="confirmPassword"
placeholder="Confirm Password">

<button type="submit">Register</button>

</form>

<p>
Already have an account?
<a href="{{ url_for('login') }}">Login</a>
</p>

<p>
<a href="{{ url_for('home') }}">⬅ Back to Home</a>
</p>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
